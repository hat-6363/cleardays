<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cleardays — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --ink: #1A1208;
    --ink-soft: #4A3728;
    --cream: #FDFAF5;
    --warm: #F7F1E8;
    --sand: #EDE3D4;
    --tan: #C9B99A;
    --orange: #E05C1A;
    --orange-light: #FFF3EC;
    --border: #E5D9C8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  nav {
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: white;
  }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--ink);
    text-decoration: none;
  }
  .logo em { color: var(--orange); font-style: normal; }

  .page {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(224,92,26,0.06) 0%, transparent 70%);
  }

  .card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 48px 44px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 8px 40px rgba(26,18,8,0.08);
  }

  .card-icon { font-size: 36px; margin-bottom: 16px; }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .card-sub {
    font-size: 14px;
    color: var(--ink-soft);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    color: var(--ink);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 20px;
  }

  .form-input:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(224,92,26,0.1);
    background: white;
  }

  .btn {
    width: 100%;
    background: var(--orange);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(224,92,26,0.25);
  }

  .btn:hover { background: #c44d12; transform: translateY(-1px); }
  .btn:disabled { background: var(--tan); cursor: not-allowed; transform: none; box-shadow: none; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    color: var(--tan);
    font-size: 12px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .success-box {
    display: none;
    background: var(--orange-light);
    border: 1.5px solid rgba(224,92,26,0.2);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }

  .success-box.show { display: block; }
  .success-icon { font-size: 32px; margin-bottom: 10px; }
  .success-title { font-weight: 600; font-size: 16px; color: var(--ink); margin-bottom: 6px; }
  .success-sub { font-size: 13px; color: var(--ink-soft); line-height: 1.5; }

  .error-msg {
    background: #fdecea;
    border: 1px solid #f5c6c2;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #c0392b;
    margin-bottom: 16px;
    display: none;
  }
  .error-msg.show { display: block; }

  .back-link {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: var(--tan);
  }
  .back-link a { color: var(--orange); text-decoration: none; font-weight: 500; }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Clear<em>days</em></a>
</nav>

<div class="page">
  <div class="card">
    <div class="card-icon">☀️</div>
    <div class="card-title">Welcome back</div>
    <p class="card-sub">Enter your email and we'll send you a magic link to sign in instantly — no password needed.</p>

    <div class="error-msg" id="errorMsg"></div>

    <div id="loginForm">
      <label class="form-label">Email address</label>
      <input class="form-input" type="email" id="emailInput" placeholder="you@example.com">
      <button class="btn" id="loginBtn" onclick="sendMagicLink()">Send Magic Link</button>
    </div>

    <div class="success-box" id="successBox">
      <div class="success-icon">📬</div>
      <div class="success-title">Check your inbox!</div>
      <p class="success-sub">We've sent a sign-in link to <strong id="sentTo"></strong>. Click the link in the email to access your dashboard.</p>
    </div>

    <div class="back-link">
      <a href="index.html">← Back to Cleardays</a>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://jtrbcorhnokokxtutmio.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_8Ft91_p3MtwapHLoLWfDLA_ftrebeIb';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // If already logged in, go to dashboard
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'dashboard.html';
  });

  async function sendMagicLink() {
    const email = document.getElementById('emailInput').value.trim();
    const btn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    errorMsg.classList.remove('show');

    if (!email || !email.includes('@')) {
      errorMsg.textContent = 'Please enter a valid email address.';
      errorMsg.classList.add('show');
      return;
    }

    btn.textContent = 'Sending…';
    btn.disabled = true;

    const { error } = await sb.auth.signInWithOtp({
      email,
      options: {
        emailRedirectTo: window.location.origin + '/dashboard.html'
      }
    });

    if (error) {
      errorMsg.textContent = error.message;
      errorMsg.classList.add('show');
      btn.textContent = 'Send Magic Link';
      btn.disabled = false;
    } else {
      document.getElementById('sentTo').textContent = email;
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('successBox').classList.add('show');
    }
  }

  document.getElementById('emailInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMagicLink();
  });
</script>
</body>
</html>
